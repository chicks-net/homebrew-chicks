name: Brew Formula

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# global permissions
permissions: {}

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # Windows excluded: Homebrew only supports macOS and Linux
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    env:
      HOMEBREW_NO_SANDBOX_LINUX: 1

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Setup Homebrew (installs on Linux, updates on macOS)
      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@2ebcf16054461267868620b1414507f3ccc765c1 # master

      # Install just command runner
      - name: Install just
        run: brew install just
        shell: bash

      # Run the formula tests
      - name: Test chicks-text-tools formula
        run: just test-chicks-text-tools
        shell: bash
