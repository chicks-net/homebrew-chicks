name: Release

# Triggered by tag pushes from `just release` (gh release create pushes the tag,
# which fires this workflow). The workflow attaches signed assets to the
# already-created release via `gh release upload`, so `just release` itself
# requires no changes. There is a brief ~60-90s window where the release exists
# with no assets while signing runs - acceptable for a tap repo.
on:
  push:
    tags:
      - 'v*'

# Empty global permissions - each job declares what it needs.
permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # gh release upload
      id-token: write    # cosign keyless OIDC
      attestations: write # GitHub artifact attestations
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build asset bundle
        id: bundle
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          BUNDLE="homebrew-chicks-${TAG}.tar.gz"
          # Metadata-only asset set: formula files + Brewfile + README.
          # We do not publish source tarballs for upstream projects that
          # already sign their own releases - Scorecard's Signed-Releases
          # only cares that *something* is signed, not that it is a binary.
          tar -czf "${BUNDLE}" \
            Formula/*.rb \
            Brewfile \
            README.md
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "bundle=${BUNDLE}" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        env:
          BUNDLE: ${{ steps.bundle.outputs.bundle }}
        run: |
          set -euo pipefail
          sha256sum "${BUNDLE}" > checksums.txt
          cat checksums.txt

      - name: Generate subject hashes for SLSA provenance
        id: hash
        env:
          BUNDLE: ${{ steps.bundle.outputs.bundle }}
        run: |
          set -euo pipefail
          # SLSA generator expects base64-encoded sha256sum lines.
          hashes=$(sha256sum "${BUNDLE}" checksums.txt | base64 -w0)
          echo "hashes=$hashes" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532 # v0.20.0
        with:
          file: ${{ steps.bundle.outputs.bundle }}
          format: json
          output-file: ${{ steps.bundle.outputs.bundle }}.sbom.json

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign asset bundle with cosign (keyless)
        env:
          BUNDLE: ${{ steps.bundle.outputs.bundle }}
        run: |
          set -euo pipefail
          # Keyless signing via GitHub OIDC - no long-lived secrets to rotate.
          cosign sign-blob --yes "${BUNDLE}" \
            --output-signature "${BUNDLE}.sig" \
            --output-certificate "${BUNDLE}.pem" \
            --bundle "${BUNDLE}.bundle"

      - name: Upload signed assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.bundle.outputs.tag }}
          BUNDLE: ${{ steps.bundle.outputs.bundle }}
        run: |
          set -euo pipefail
          gh release upload "${TAG}" \
            "${BUNDLE}" \
            checksums.txt \
            "${BUNDLE}.sig" \
            "${BUNDLE}.pem" \
            "${BUNDLE}.bundle" \
            "${BUNDLE}.sbom.json" \
            --clobber

  provenance:
    needs: release
    permissions:
      actions: read
      id-token: write
      contents: write
    # SLSA generator requires a tag ref (refs/tags/vX.Y.Z) for its internal
    # builder checkout; pinning to a git SHA causes "Invalid ref" errors and
    # provenance generation failure.
    # See: https://github.com/fini-net/gh-observer/actions/runs/27281001944
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0 # zizmor: ignore[unpinned-uses]
    with:
      base64-subjects: "${{ needs.release.outputs.hashes }}"
      upload-assets: true